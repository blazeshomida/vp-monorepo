name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "24"
          cache: true

      - name: Install dependencies
        run: vp install

      - name: Cache Vite+ task cache and build output
        uses: actions/cache@v5
        with:
          path: |
            node_modules/.vite
            node_modules/.vite-temp
            packages/*/dist
            playgrounds/*/dist
          key: vite-plus-task-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ github.sha }}
          restore-keys: |
            vite-plus-task-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-
            vite-plus-task-${{ runner.os }}-

      - name: Create release pull request or publish packages
        uses: changesets/action@v1
        with:
          version: vp run version
          publish: vp run release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
